{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Alert-Einstellungen - MoneyPlan{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>
            <i class="bi bi-gear"></i> Alert-Einstellungen
        </h1>
        <a href="{% url 'alerts:list' %}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Zurück
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            {% crispy form %}

            <div class="mt-4">
                <button type="button"
                        class="btn btn-info"
                        hx-post="{% url 'alerts:test_mail' %}"
                        hx-target="#test-mail-result"
                        hx-swap="innerHTML"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
                    <i class="bi bi-envelope"></i> Test-Mail senden
                </button>
                <div id="test-mail-result" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
