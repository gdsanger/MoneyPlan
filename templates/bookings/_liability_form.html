{% load crispy_forms_tags %}

<form method="post">
    {% csrf_token %}
    {% crispy form %}
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> Speichern
        </button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-circle"></i> Abbrechen
        </button>
    </div>
</form>
