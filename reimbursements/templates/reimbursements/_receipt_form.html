<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title mb-3">
            <i class="bi bi-check-circle text-success"></i> Tankbeleg erkannt
        </h5>

        <div class="alert alert-info mb-3">
            <strong>Erkannt:</strong> {{ receipt_result.raw_text|truncatewords:20 }}<br>
            <small class="text-muted">{{ receipt_result.ai_provider }} / {{ receipt_result.ai_model }}</small>
        </div>

        {% if upload_error %}
        <div class="alert alert-danger">{{ upload_error }}</div>
        {% endif %}

        <form method="post"
              hx-post="{% url 'reimbursements:receipt_confirm' %}"
              hx-target="#receipt-modal-content"
              hx-swap="innerHTML">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Datum*
                    {% if receipt_result.confidence.date == 'high' %}<span class="badge bg-success">🟢</span>
                    {% elif receipt_result.confidence.date == 'medium' %}<span class="badge bg-warning">🟡</span>
                    {% else %}<span class="badge bg-danger">🔴</span>{% endif %}
                </label>
                {{ form.date }}
            </div>
            <div class="mb-3">
                <label class="form-label">Beschreibung*
                    {% if receipt_result.confidence.description == 'high' %}<span class="badge bg-success">🟢</span>
                    {% elif receipt_result.confidence.description == 'medium' %}<span class="badge bg-warning">🟡</span>
                    {% else %}<span class="badge bg-danger">🔴</span>{% endif %}
                </label>
                {{ form.description }}
            </div>
            <div class="mb-3">
                <label class="form-label">Betrag (Erstattung)*
                    {% if receipt_result.confidence.amount == 'high' %}<span class="badge bg-success">🟢</span>
                    {% elif receipt_result.confidence.amount == 'medium' %}<span class="badge bg-warning">🟡</span>
                    {% else %}<span class="badge bg-danger">🔴</span>{% endif %}
                </label>
                {{ form.amount }}
            </div>
            <div class="mb-3">
                <label class="form-label">Notizen</label>
                {{ form.notes }}
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Speichern
                </button>
            </div>
        </form>
    </div>
</div>
