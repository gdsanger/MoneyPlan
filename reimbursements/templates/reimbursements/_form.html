<form method="post"
      {% if claim %}action="{% url 'reimbursements:edit' claim.id %}"{% endif %}
      {% if request.htmx %}
      hx-post="{% url 'reimbursements:edit' claim.id %}"
      hx-target="#form-modal-content"
      hx-swap="innerHTML"
      {% endif %}>
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Datum</label>
        {{ form.date }}
    </div>
    <div class="mb-3">
        <label class="form-label">Beschreibung</label>
        {{ form.description }}
    </div>
    <div class="mb-3">
        <label class="form-label">Betrag</label>
        {{ form.amount }}
    </div>
    <div class="mb-3">
        <label class="form-label">Notizen</label>
        {{ form.notes }}
    </div>
    <div class="d-flex justify-content-end gap-2">
        {% if request.htmx %}
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
        {% else %}
        <a href="{% url 'reimbursements:list' %}" class="btn btn-secondary">Abbrechen</a>
        {% endif %}
        <button type="submit" class="btn btn-primary">Speichern</button>
    </div>
</form>
