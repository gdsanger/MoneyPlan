<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title mb-3">
            <i class="bi bi-fuel-pump"></i> Tankbeleg hochladen
        </h5>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data"
              hx-post="{% url 'reimbursements:receipt_upload' %}"
              hx-target="#receipt-modal-content"
              hx-swap="innerHTML"
              hx-indicator="#fuel-receipt-spinner">
            {% csrf_token %}
            <div class="mb-3">
                <label for="receipt_file" class="form-label">Datei auswählen</label>
                <input class="form-control" type="file" id="receipt_file" name="receipt_file"
                       accept="image/jpeg,image/png,image/webp,application/pdf" required>
                <div class="form-text">PDF, JPG, PNG, WEBP (max. 10 MB)</div>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-robot"></i> Analysieren
                </button>
            </div>
        </form>

        <div id="fuel-receipt-spinner" class="htmx-indicator text-center py-4">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2 text-muted">KI analysiert Tankbeleg...</p>
        </div>
    </div>
</div>
